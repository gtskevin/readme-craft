      @media (prefers-color-scheme: dark) {
        .banner-bg { fill: #0f172a; }
      }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect class="banner-bg" width="800" height="200" rx="12" fill="url(#bgGrad)"/>
  <!-- Decorative elements -->
  <circle cx="80" cy="100" r="45" fill="white" opacity="0.05"/>
  <circle cx="720" cy="60" r="80" fill="white" opacity="0.03"/>
  <circle cx="680" cy="160" r="35" fill="white" opacity="0.04"/>
  <!-- Stars decoration -->
  <path d="M50 40 L53 48 L61 48 L55 53 L57 61 L50 56 L43 61 L45 53 L39 48 L47 48 Z" fill="white" opacity="0.3"/>
  <path d="M740 130 L742 136 L749 136 L744 140 L746 146 L740 142 L734 146 L736 140 L731 136 L738 136 Z" fill="white" opacity="0.2"/>
